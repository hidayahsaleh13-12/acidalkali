<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangkalan Data Kimia Lengkap</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #2980b9; color: white; font-weight: bold; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #eef9f1; border-radius: 8px; display: none; }
        .formula { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Database Asid & Alkali</h2>
    
    <label>Pilih Asid:</label>
    <select id="asid">
        <optgroup label="Asid Kuat">
            <option value="HCl">HCl (Asid Hidroklorik)</option>
            <option value="H2SO4">Hâ‚‚SOâ‚„ (Asid Sulfurik)</option>
            <option value="HNO3">Asid Nitrik (HNOâ‚ƒ)</option>
        </optgroup>
        <optgroup label="Asid Lemah">
            <option value="CH3COOH">CHâ‚ƒCOOH (Asid Etanoik)</option>
            <option value="H3PO4">Hâ‚ƒPOâ‚„ (Asid Fosforik)</option>
            <option value="H2CO3">Hâ‚‚COâ‚ƒ (Asid Karbonik)</option>
        </optgroup>
    </select>

    <label>Pilih Alkali:</label>
    <select id="alkali">
        <optgroup label="Alkali Kuat">
            <option value="NaOH">NaOH (Natrium Hidroksida)</option>
            <option value="KOH">KOH (Kalium Hidroksida)</option>
            <option value="Ca(OH)2">Ca(OH)â‚‚ (Kalsium Hidroksida)</option>
            <option value="Ba(OH)2">Ba(OH)â‚‚ (Barium Hidroksida)</option>
        </optgroup>
        <optgroup label="Alkali Lemah">
            <option value="NH3">NHâ‚ƒ (Larutan Ammonia / NHâ‚„OH)</option>
            <option value="Mg(OH)2">Mg(OH)â‚‚ (Magnesium Hidroksida)</option>
        </optgroup>
    </select>

    <button onclick="prosesData()">SEMAK PERSAMAAN</button>

    <div id="result" class="result">
        <p><strong>Persamaan Seimbang:</strong></p>
        <div id="displayEq" class="formula"></div>
        <hr>
        <p id="displayIon"></p>
    </div>
</div>

<script>
    // Database logik imbangan [PekaliAsid, PekaliAlkali, PekaliGaram, PekaliAir]
    const masterDB = {
        // Asid Monoprotik (1 H+)
        "HCl+NaOH": { eq: "1HCl + 1NaOH â†’ 1NaCl + 1Hâ‚‚O", ion: "Naâپ؛ & Clâپ»" },
        "HCl+KOH": { eq: "1HCl + 1KOH â†’ 1KCl + 1Hâ‚‚O", ion: "Kâپ؛ & Clâپ»" },
        "HCl+Ca(OH)2": { eq: "2HCl + 1Ca(OH)â‚‚ â†’ 1CaClâ‚‚ + 2Hâ‚‚O", ion: "Caآ²âپ؛ & Clâپ»" },
        "HNO3+NaOH": { eq: "1HNOâ‚ƒ + 1NaOH â†’ 1NaNOâ‚ƒ + 1Hâ‚‚O", ion: "Naâپ؛ & NOâ‚ƒâپ»" },
        "CH3COOH+NaOH": { eq: "1CHâ‚ƒCOOH + 1NaOH â†’ 1CHâ‚ƒCOONa + 1Hâ‚‚O", ion: "Naâپ؛ & CHâ‚ƒCOOâپ»" },
        
        // Asid Diprotik (2 H+)
        "H2SO4+NaOH": { eq: "1Hâ‚‚SOâ‚„ + 2NaOH â†’ 1Naâ‚‚SOâ‚„ + 2Hâ‚‚O", ion: "Naâپ؛ & SOâ‚„آ²âپ»" },
        "H2SO4+KOH": { eq: "1Hâ‚‚SOâ‚„ + 2KOH â†’ 1Kâ‚‚SOâ‚„ + 2Hâ‚‚O", ion: "Kâپ؛ & SOâ‚„آ²âپ»" },
        "H2SO4+Ca(OH)2": { eq: "1Hâ‚‚SOâ‚„ + 1Ca(OH)â‚‚ â†’ 1CaSOâ‚„ + 2Hâ‚‚O", ion: "Caآ²âپ؛ & SOâ‚„آ²âپ»" },
        
        // Asid Triprotik (3 H+)
        "H3PO4+NaOH": { eq: "1Hâ‚ƒPOâ‚„ + 3NaOH â†’ 1Naâ‚ƒPOâ‚„ + 3Hâ‚‚O", ion: "Naâپ؛ & POâ‚„آ³âپ»" },
        "H3PO4+Ca(OH)2": { eq: "2Hâ‚ƒPOâ‚„ + 3Ca(OH)â‚‚ â†’ 1Caâ‚ƒ(POâ‚„)â‚‚ + 6Hâ‚‚O", ion: "Caآ²âپ؛ & POâ‚„آ³âپ»" },

        // Alkali Lemah (Ammonia)
        "HCl+NH3": { eq: "1HCl + 1NHâ‚ƒ â†’ 1NHâ‚„Cl", ion: "NHâ‚„âپ؛ & Clâپ» (Tiada Air Terhasil)" }
    };

    function prosesData() {
        const a = document.getElementById('asid').value;
        const b = document.getElementById('alkali').value;
        const key = a + "+" + b;
        const info = masterDB[key];

        const resDiv = document.getElementById('result');
        if(info) {
            resDiv.style.display = "block";
            document.getElementById('displayEq').innerText = info.eq;
            document.getElementById('displayIon').innerHTML = "<b>Kation & Anion:</b> " + info.ion;
        } else {
            alert("Kombinasi asid/alkali ini belum didaftarkan dalam pangkalan data.");
        }
    }
</script>

</body>
</html>
