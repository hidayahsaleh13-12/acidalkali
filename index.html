<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Imbangan Kimia</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f8f9fa; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f4fd; border-radius: 10px; display: none; }
        .coeff { color: #d35400; font-weight: bold; font-size: 20px; }
        .molecule { font-size: 18px; font-weight: bold; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #2c3e50; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Imbangan Persamaan</h2>
    <p><small>Aplikasi ini mengira nisbah mol untuk peneutralan lengkap.</small></p>

    <label>Asid:</label>
    <select id="asid">
        <option value="HCl">HCl (Monoprotik)</option>
        <option value="H2SO4">H₂SO₄ (Diprotik)</option>
        <option value="H3PO4">H₃PO₄ (Triprotik)</option>
    </select>

    <label>Alkali:</label>
    <select id="alkali">
        <option value="NaOH">NaOH</option>
        <option value="Ca(OH)2">Ca(OH)₂</option>
    </select>

    <button onclick="kiraImbangan()">IMBANGKAN SEKARANG</button>

    <div id="result" class="result-box">
        <div id="persamaan-imbangi" style="text-align: center; margin-bottom: 15px;"></div>
        <div id="penjelasan-matematik" style="font-size: 14px; color: #555;"></div>
    </div>
</div>

<script>
    // Data Imbangan: [AsidCoeff, AlkaliCoeff, SaltCoeff, WaterCoeff]
    const balancingData = {
        "HCl+NaOH": { c: [1, 1, 1, 1], salt: "NaCl" },
        "HCl+Ca(OH)2": { c: [2, 1, 1, 2], salt: "CaCl₂" },
        "H2SO4+NaOH": { c: [1, 2, 1, 2], salt: "Na₂SO₄" },
        "H2SO4+Ca(OH)2": { c: [1, 1, 1, 2], salt: "CaSO₄" },
        "H3PO4+NaOH": { c: [1, 3, 1, 3], salt: "Na₃PO₄" }
    };

    function kiraImbangan() {
        const asid = document.getElementById('asid').value;
        const alkali = document.getElementById('alkali').value;
        const key = asid + "+" + alkali;
        const data = balancingData[key];

        if (data) {
            const res = document.getElementById('result');
            res.style.display = "block";
            
            // Paparkan persamaan dengan pekali berwarna
            document.getElementById('persamaan-imbangi').innerHTML = `
                <span class="coeff">${data.c[0]}</span>${asid} + 
                <span class="coeff">${data.c[1]}</span>${alkali} → 
                <span class="coeff">${data.c[2]}</span>${data.salt} + 
                <span class="coeff">${data.c[3]}</span>H₂O
            `;

            // Penjelasan Matematik
            document.getElementById('penjelasan-matematik').innerHTML = `
                <b>Nisbah Mol:</b> ${data.c[0]} : ${data.c[1]}<br><br>
                <i>Kenapa?</i><br>
                Untuk meneutralkan asid ini sepenuhnya, anda memerlukan 
                ${data.c[1]} mol alkali bagi setiap ${data.c[0]} mol asid supaya bilangan ion H⁺ dan OH⁻ adalah sama.
            `;
        } else {
            alert("Kombinasi ini belum direkodkan.");
        }
    }
</script>

</body>
</html>
